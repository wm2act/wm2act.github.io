<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World2Act | Coming Soon</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 700px;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #000;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }
        .status-box {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #007bff;
            display: inline-block;
            text-align: left;
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            background: #007bff;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .loading-text::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="badge">Robotics & AI Research</div>
    <h1>World2Act</h1>
    <p class="subtitle">Latent Action Post-Training via Skill-Compositional World Models</p>
    
    <div class="status-box">
        <strong>Status:</strong> <span class="loading-text">Optimizing latent dynamics</span>
        <p style="margin-top: 10px; font-size: 0.95rem; line-height: 1.5;">
            Stay tuned for more updates.
        </p>
    </div>

    <p style="margin-top: 40px; color: #888; font-size: 0.85rem;">
        &copy; 2026 World2Act Team.
    </p>
</div>

</body>
</html>
